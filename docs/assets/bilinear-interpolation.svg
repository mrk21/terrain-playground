<svg viewBox="0 0 380 252" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" role="img" aria-label="双線形補間：左辺と右辺を ty で縦に1次元補間して left と right を作り、その2点を tx で横に1次元補間して内部の値 value を得る、計3回の補間">
  <style>
    .cell  { fill: #5a9bd41a; stroke: #5a9bd4; stroke-width: 1.3; }
    .vert  { stroke: #5a9bd4; stroke-width: 3; stroke-linecap: round; }
    .horiz { stroke: #4f9d69; stroke-width: 3; stroke-linecap: round; }
    .cdot  { fill: #5a9bd4; }
    .gdot  { fill: #4f9d69; }
    .lbl   { fill: #8b949e; font-size: 11px; }
    .bblue { fill: #5a9bd4; font-size: 11px; font-weight: bold; }
    .bgrn  { fill: #4f9d69; font-size: 11px; font-weight: bold; }
    .ttl   { fill: #8b949e; font-size: 12px; font-weight: bold; }
    .badgeB{ fill: #5a9bd4; }
    .badgeG{ fill: #4f9d69; }
    .bnum  { fill: #ffffff; font-size: 11px; font-weight: bold; }
    .capB  { fill: #5a9bd4; font-size: 11px; }
    .capG  { fill: #4f9d69; font-size: 11px; }
  </style>

  <text class="ttl" x="190" y="20" text-anchor="middle">双線形補間 ＝ 縦に2回 → 横に1回 の 1次元補間</text>

  <!-- cell -->
  <rect class="cell" x="110" y="52" width="160" height="130"/>

  <!-- step 1 & 2: vertical lerps emphasised on the two side edges -->
  <line class="vert" x1="110" y1="52" x2="110" y2="182"/>
  <line class="vert" x1="270" y1="52" x2="270" y2="182"/>
  <!-- step 3: horizontal lerp connecting left & right -->
  <line class="horiz" x1="110" y1="110" x2="270" y2="110"/>

  <!-- corner values -->
  <g class="cdot">
    <circle cx="110" cy="52" r="3"/><circle cx="270" cy="52" r="3"/>
    <circle cx="110" cy="182" r="3"/><circle cx="270" cy="182" r="3"/>
  </g>
  <text class="lbl" x="104" y="48" text-anchor="end">v00</text>
  <text class="lbl" x="276" y="48" text-anchor="start">v10</text>
  <text class="lbl" x="104" y="194" text-anchor="end">v01</text>
  <text class="lbl" x="276" y="194" text-anchor="start">v11</text>

  <!-- intermediate points: left / right (results of step 1,2) -->
  <circle class="cdot" cx="110" cy="110" r="3.6"/>
  <circle class="cdot" cx="270" cy="110" r="3.6"/>
  <text class="bblue" x="100" y="114" text-anchor="end">left</text>
  <text class="bblue" x="280" y="114" text-anchor="start">right</text>

  <!-- final point: value (result of step 3) -->
  <circle class="gdot" cx="206" cy="110" r="4.6"/>
  <text class="bgrn" x="206" y="128" text-anchor="middle">value (tx, ty)</text>

  <!-- step badges -->
  <circle class="badgeB" cx="110" cy="84" r="9"/>
  <text class="bnum" x="110" y="88" text-anchor="middle">1</text>
  <circle class="badgeB" cx="270" cy="84" r="9"/>
  <text class="bnum" x="270" y="88" text-anchor="middle">2</text>
  <circle class="badgeG" cx="158" cy="110" r="9"/>
  <text class="bnum" x="158" y="114" text-anchor="middle">3</text>

  <!-- captions -->
  <text class="capB" x="190" y="218" text-anchor="middle">① ② 左辺・右辺を ty で縦に補間 → left / right</text>
  <text class="capG" x="190" y="236" text-anchor="middle">③ left ↔ right を tx で横に補間 → value</text>
</svg>
