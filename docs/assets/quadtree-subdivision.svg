<svg viewBox="0 0 480 165" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" role="img" aria-label="四分木の分割：depth 0 の1枚から 2×2、さらに細かい所だけ深く分割">
  <style>
    .box  { fill: #5a9bd433; stroke: #5a9bd4; stroke-width: 1.5; }
    .grid { stroke: #5a9bd4; stroke-width: 1.2; }
    .arr  { fill: #5a9bd4; }
    .lbl  { fill: #8b949e; font-size: 11px; }
    .cap  { fill: #8b949e; font-size: 10px; }
  </style>

  <!-- Panel 1: depth 0 -->
  <rect class="box" x="12" y="28" width="100" height="100"/>
  <text class="lbl" x="62" y="82" text-anchor="middle">depth 0</text>
  <text class="cap" x="62" y="148" text-anchor="middle">ルート＝広く粗く</text>

  <!-- arrow 1 -->
  <text class="cap" x="142" y="70" text-anchor="middle">分割</text>
  <line class="grid" x1="120" y1="78" x2="162" y2="78"/>
  <path class="arr" d="M164,78 l-8,-4 v8 z"/>

  <!-- Panel 2: 2x2 -->
  <rect class="box" x="176" y="28" width="100" height="100"/>
  <line class="grid" x1="226" y1="28" x2="226" y2="128"/>
  <line class="grid" x1="176" y1="78" x2="276" y2="78"/>
  <text class="cap" x="226" y="148" text-anchor="middle">1段で4ノード</text>

  <!-- arrow 2 -->
  <text class="cap" x="312" y="70" text-anchor="middle">さらに分割</text>
  <line class="grid" x1="284" y1="78" x2="336" y2="78"/>
  <path class="arr" d="M338,78 l-8,-4 v8 z"/>

  <!-- Panel 3: adaptive (top-right quadrant subdivided deeper) -->
  <rect class="box" x="350" y="28" width="100" height="100"/>
  <line class="grid" x1="400" y1="28" x2="400" y2="128"/>
  <line class="grid" x1="350" y1="78" x2="450" y2="78"/>
  <line class="grid" x1="425" y1="28" x2="425" y2="78"/>
  <line class="grid" x1="400" y1="53" x2="450" y2="53"/>
  <text class="cap" x="400" y="148" text-anchor="middle">細かい所だけ深く</text>
</svg>
