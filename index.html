<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>WebGL Playground</title>
  </head>
  <body>
    <canvas id="gl"></canvas>
    <div id="ui">
      <button data-scene="heightmap3d">地形3D</button>

      回転・傾け: 2本指・Shift+ドラッグ(3D)
    </div>
    <div id="hud"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
