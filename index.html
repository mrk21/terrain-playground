<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Terrain Playground</title>
  </head>
  <body>
    <canvas id="gl"></canvas>
    <!-- タブ・2D/3D トグルは常時表示。パラメータフォームは右列の設定アイコンで開閉する。
         中身は src/ui/controls.ts が組み立てる。 -->
    <div id="panel">
      <div id="tabs"></div>
      <div id="ui"></div>
      <div id="params"></div>
    </div>
    <!-- 右列：パラメータ開閉（上）→ 方位磁針 → 初期位置リセット
         （方位磁針・リセットは src/ui/camera-controls.ts が追加する）。 -->
    <div id="camera">
      <button
        type="button"
        id="params-toggle"
        class="cam-btn"
        title="パラメータ"
        aria-label="パラメータ"
      >
        <svg viewBox="0 0 24 24" fill="#e8e8ef" aria-hidden="true">
          <path
            d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"
          />
        </svg>
      </button>
    </div>
    <!-- 画面下：マウス位置の座標・標高（上）→ 性能 HUD → 操作説明を縦に積む。
         縮尺バー(#scale)は #bottom 内で右下隅へ浮かせ（absolute）、操作説明と重なるときだけ
         scale-bar.ts が 1 行ぶん上へ持ち上げる（他の HUD は押し上げない）。 -->
    <div id="bottom">
      <div id="coords"></div>
      <div id="hud"></div>
      <div id="hint">
        移動: 1本指・ドラッグ / 拡大縮小: ピンチ・ダブルタップ後に上下・ホイール /
        回転・傾け: 2本指・Shift+ドラッグ(3D)
      </div>
      <div id="scale">
        <span id="scale-label"></span>
        <div id="scale-bar"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
